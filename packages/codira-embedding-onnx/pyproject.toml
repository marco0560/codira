[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "codira-embedding-onnx"
version = "1.0.0"
description = "First-party native ONNX Runtime embedding engine plugin for codira"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "codira>=1.5.0,<2.0.0",
    "numpy>=2.0,<3.0",
    "onnxruntime>=1.18,<2.0",
    "tokenizers>=0.19,<1.0",
]

[project.optional-dependencies]
test = [
    "black",
    "mypy",
    "pytest",
    "ruff",
]

[project.entry-points."codira.embedding_engines"]
onnx = "codira_embedding_onnx:build_engine"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
codira_embedding_onnx = ["py.typed"]

[tool.black]
line-length = 88
target-version = ["py313"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.mypy]
python_version = "3.13"
strict = true

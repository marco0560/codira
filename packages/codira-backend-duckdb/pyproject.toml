[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "codira-backend-duckdb"
version = "1.5.3"
description = "First-party DuckDB backend plugin for codira"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "codira>=1.5.0,<2.0.0",
    "duckdb>=1.4,<2.0",
]

[project.optional-dependencies]
test = [
    "black",
    "mypy",
    "pytest",
    "ruff",
]

[project.entry-points."codira.backends"]
duckdb = "codira_backend_duckdb:build_backend"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.black]
line-length = 88
target-version = ["py313"]

[tool.ruff]
line-length = 88
target-version = "py313"

[tool.mypy]
python_version = "3.13"
strict = true

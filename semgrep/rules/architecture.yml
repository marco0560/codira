rules:
  - id: codira.arch.no-storage-import-in-analyzers
    message: >
      Analyzer packages must not import codira storage internals.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-analyzer-*/src/**/*.py
        - /fixtures/packages/codira-analyzer-*/src/**/*.py
    patterns:
      - pattern-either:
          - pattern: import codira.storage
          - pattern: from codira.storage import $IMPORT

  - id: codira.arch.no-registry-import-in-analyzers
    message: >
      Analyzer packages must not import codira registry internals.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-analyzer-*/src/**/*.py
        - /fixtures/packages/codira-analyzer-*/src/**/*.py
    patterns:
      - pattern-either:
          - pattern: import codira.registry
          - pattern: from codira.registry import $IMPORT

  - id: codira.arch.no-backend-import-in-analyzers
    message: >
      Analyzer packages must remain backend-agnostic.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-analyzer-*/src/**/*.py
        - /fixtures/packages/codira-analyzer-*/src/**/*.py
    patterns:
      - pattern-either:
          - pattern: import codira_backend_sqlite
          - pattern: from codira_backend_sqlite import $IMPORT
          - pattern: import codira_backend_duckdb
          - pattern: from codira_backend_duckdb import $IMPORT
      - pattern-not-regex: from codira_backend_(sqlite|duckdb)\.schema import

  - id: codira.arch.no-sqlite3-in-analyzers
    message: >
      Analyzer packages must not depend on sqlite3 directly.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-analyzer-*/src/**/*.py
        - /fixtures/packages/codira-analyzer-*/src/**/*.py
      exclude:
        - /tests/**/*.py
    patterns:
      - pattern-either:
          - pattern: import sqlite3
          - pattern: from sqlite3 import $IMPORT

  - id: codira.arch.require-analyzer-capability-declaration
    message: >
      First-party analyzer modules must expose analyzer_capability_declaration.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-analyzer-*/src/**/*.py
        - /fixtures/packages/codira-analyzer-*/src/**/*.py
    patterns:
      - pattern-either:
          - pattern: |
              class $CLASS:
                ...
          - pattern: |
              class $CLASS(...):
                ...
      - metavariable-regex:
          metavariable: $CLASS
          regex: ^[A-Za-z_][A-Za-z0-9_]*Analyzer$
      - pattern-not-inside: |
          class $CLASS:
            ...
            def analyzer_capability_declaration(...):
              ...
      - pattern-not-inside: |
          class $CLASS(...):
            ...
            def analyzer_capability_declaration(...):
              ...

  - id: codira.arch.no-sqlite3-outside-allowed-layers
    message: >
      sqlite3 imports outside documented allowlists are architectural debt.
      Update docs/process/semgrep-architecture-guardrails.md before extending
      the allowlist.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /src/**/*.py
        - /packages/**/*.py
        - /examples/plugins/**/*.py
        - /fixtures/src/**/*.py
      exclude:
        - /packages/codira-backend-sqlite/src/codira_backend_sqlite/__init__.py
        - /packages/codira-backend-sqlite/src/codira_backend_sqlite/sqlite_storage.py
        - /packages/codira-backend-sqlite/src/codira_backend_sqlite/sqlite_support.py
        - /packages/codira-vector-store-sqlite/src/codira_vector_store_sqlite/__init__.py
        - /packages/**/tests/**/*.py
    patterns:
      - pattern-either:
          - pattern: import sqlite3
          - pattern: from sqlite3 import $IMPORT

  - id: codira.arch.no-backend-package-import-outside-allowed-layers
    message: >
      Backend package imports outside documented allowlists are architectural
      debt. Update docs/process/semgrep-architecture-guardrails.md before
      extending the allowlist.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /src/**/*.py
        - /packages/**/*.py
        - /examples/plugins/**/*.py
        - /fixtures/src/**/*.py
      exclude:
        - /packages/codira-backend-sqlite/src/codira_backend_sqlite/__init__.py
        - "**/packages/codira-backend-sqlite/src/codira_backend_sqlite/sqlite_storage.py"
        - "**/packages/codira-backend-duckdb/src/codira_backend_duckdb/__init__.py"
        - "**/packages/codira-backend-duckdb/src/codira_backend_duckdb/duckdb_query_backend.py"
        - /examples/plugins/codira_demo_backend/src/codira_demo_backend/__init__.py
        - /packages/**/tests/**/*.py
    patterns:
      - pattern-either:
          - pattern: import codira_backend_sqlite
          - pattern: from codira_backend_sqlite import $IMPORT
          - pattern: import codira_backend_duckdb
          - pattern: from codira_backend_duckdb import $IMPORT

  - id: codira.arch.no-direct-config-load-in-query-hot-path
    message: >
      Query hot paths must use command-scoped runtime configuration instead of
      directly loading effective config.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /src/codira/query/**/*.py
        - /src/codira/semantic/search.py
        - /fixtures/src/**/*.py
      exclude:
        - /tests/**/*.py
    patterns:
      - pattern: load_effective_config(...)

  - id: codira.arch.no-duckdb-executemany-in-support
    message: >
      DuckDB persistence must use columnar batch loading instead of row-wise
      executemany calls.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-backend-duckdb/src/codira_backend_duckdb/duckdb_support.py
        - /packages/codira-vector-store-duckdb/src/**/*.py
        - /fixtures/packages/codira-backend-duckdb/src/**/*.py
        - /fixtures/packages/codira-vector-store-duckdb/src/**/*.py
    patterns:
      - pattern: $CONN.executemany(...)

  - id: codira.arch.no-duckdb-returning-id-in-support
    message: >
      DuckDB support persistence must allocate IDs before columnar batch
      loading instead of using INSERT ... RETURNING id.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-backend-duckdb/src/codira_backend_duckdb/duckdb_support.py
        - /fixtures/packages/codira-backend-duckdb/src/**/*.py
    pattern-regex: RETURNING\s+id

  - id: codira.arch.no-store-analysis-in-duckdb-full-index-bulk
    message: >
      DuckDB full-index bulk persistence must not route through the legacy
      per-file _store_analysis helper.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-backend-duckdb/src/**/*.py
        - /fixtures/packages/codira-backend-duckdb/src/**/*.py
    patterns:
      - pattern-inside: |
          def persist_full_index(...):
              ...
      - pattern: _store_analysis(...)

  - id: codira.arch.no-core-schema-ddl-import-in-backends
    message: >
      Backend plugins own their physical schema and must not import core schema
      DDL.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-backend-*/src/**/*.py
        - /fixtures/packages/codira-backend-*/src/**/*.py
    patterns:
      - pattern: from codira.schema import DDL

  - id: codira.arch.require-fresh-full-index-embedding-flush
    message: >
      DuckDB full-index bulk embedding flushes must declare fresh_full_index=True
      so stale pending-row cleanup is skipped without disabling vector-cache reuse.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-backend-duckdb/src/**/*.py
        - /fixtures/packages/codira-backend-duckdb/src/**/*.py
    patterns:
      - pattern-inside: |
          def persist_full_index(...):
              ...
      - pattern: _flush_pending_embedding_rows(...)
      - pattern-not: _flush_pending_embedding_rows(..., fresh_full_index=True, ...)

  - id: codira.arch.no-vector-store-normal-path-in-duckdb-full-index-bulk
    message: >
      DuckDB vector-store full-index bulk persistence must not route through
      the normal per-batch store_vectors path.
    severity: ERROR
    languages:
      - python
    paths:
      include:
        - /packages/codira-vector-store-duckdb/src/**/*.py
        - /fixtures/packages/codira-vector-store-duckdb/src/**/*.py
    patterns:
      - pattern-inside: |
          def store_vectors_for_full_index(...):
              ...
      - pattern: self.store_vectors(...)

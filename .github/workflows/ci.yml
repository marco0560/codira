name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install project dependencies
        run: |
          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              if [ "$attempt" = "3" ]; then
                return 1
              fi
              sleep 15
            done
          }

          retry python -m pip install --upgrade pip
          retry pip install -e ".[dev,docs,semantic]"
          retry python scripts/install_first_party_packages.py --include-core --core-extra dev --core-extra docs --core-extra semantic

      - name: Install repo-local Git configuration
        run: python scripts/install_repo_git_config.py

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run black
        run: black --check .

      - name: Run ruff
        run: ruff check .

      - name: Run mypy
        run: mypy .

      - name: Run tests
        run: pytest

      - name: Run release audit
        env:
          SKIP_RELEASE_AUDIT: "1"
        run: bash scripts/release_audit.sh

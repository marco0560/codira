site_name: codira
site_description: Repository-local indexing and context retrieval for agent-assisted development
site_author: Marco Coppola

repo_name: codira
repo_url: https://github.com/marco0560/codira
edit_uri: edit/main/docs/

theme:
  name: material
  favicon: badges/small.png
  logo: badges/cartoon_cold-2.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - footnotes

plugins:
  - search
  - awesome-pages

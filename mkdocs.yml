site_name: codira
site_description: Repository-local indexing and context retrieval for agent-assisted development
site_author: Marco Coppola

repo_name: codira
repo_url: https://github.com/marco0560/codira
edit_uri: edit/main/docs/

theme:
  name: material
  favicon: favicon.ico
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - footnotes

plugins:
  - search
  - awesome-pages

extra_css:
  - stylesheets/site.css

nav:
  - Home: index.md
  - Getting started: getting_started.md
  - Architecture:
      - Index: architecture/index.md
      - System overview: architecture/system-overview.md
      - Indexing pipeline: architecture/indexing-pipeline.md
      - Query pipeline: architecture/query-pipeline.md
      - Plugin model: architecture/plugin-model.md
      - Core contracts: architecture/core-contracts.md
      - Storage backends: architecture/storage-backends.md
      - Language analyzers: architecture/language-analyzers.md
  - Plugin development:
      - Index: plugins/index.md
      - Quick start: plugins/getting-started.md
      - Analyzer plugins: plugins/analyzers.md
      - Backend plugins: plugins/backends.md
      - Packaging and install: plugins/packaging.md
      - Tutorial: plugins/tutorial.md
  - Contributing: CONTRIBUTING.md
  - Scripts: scripts.md
  - Release checklist: release/checklist.md
  - Release process: release/process.md
  - Process:
      - Branching: process/branching.md
      - Decisions: process/decisions.md
      - Publishing walkthrough: process/python-package-publishing-walkthrough.md
      - Issue 001 execution: process/issue-001-real-embeddings-execution.md
      - Issue 009 execution: process/issue-009-capability-signal-layer-execution.md
      - Issue 009 inventory: process/issue-009-capability-signal-layer-inventory.md
      - Embedding performance execution: process/embedding-performance-execution.md
  - ADRs:
      - Index: adr/index.md
      - "... | flat | glob=adr/ADR-*.md"
